user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 110M;

    # PHP-FPM upstream
    upstream php_fpm {
        server 127.0.0.1:9000;
    }

    server {
        listen 8080;
        server_name _;

        root /app;
        index index.php;

        # Deny access to internal library files
        location ~ ^/lib/ {
            deny all;
            return 403;
        }

        # Deny access to composer files and .env
        location ~ ^/(composer\.(json|lock)|\.env|vendor/) {
            deny all;
            return 403;
        }

        # Uploaded media files (from persistent volume)
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Static assets
        location /assets/ {
            alias /app/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # PHP endpoints
        location ~ \.php$ {
            fastcgi_pass php_fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTPS "on";
            include fastcgi_params;
        }

        # Default: try file then 404 (no SPA fallback for portal)
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
